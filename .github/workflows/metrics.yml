name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch: 
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: maazsheikh039
          template: classic
          filename: github-metrics.svg
          config_timezone: Asia/Karachi
          committer_token: ${{ secrets.METRICS_TOKEN }}
          
          # Layout aur Styling
          config_display: compact
          config_padding: 0, 8%
          
          # --- Graph & Base Stats Section ---
          # 'activity' aur 'community' hi wo lines wala graph banate hain
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          
          # Tarteeb: Pehle Header, phir wo Graph, phir baqi stats
          config_order: base.header, base.activity, base.community, base.repositories, base.metadata
          
          # --- Plugins Section ---
          # Colorful Languages
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          
          # Coding Habits (Timeline graph ke liye)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
