name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch: 
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: maazsheikh039
          template: classic
          filename: github-metrics.svg
          config_timezone: Asia/Karachi
          committer_token: ${{ secrets.METRICS_TOKEN }}
          
          # --- Footer aur Extra lines hatane ke liye ---
          config_display: compact # Is se layout thoda tight aur saaf ho jayega
          config_padding: 0, 8%
          config_output: svg
          
          # Ye lines niche ka extra text khatam kar dengi
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_order: base.header, base.activity, base.community, base.repositories, base.metadata
          
          # Plugins (Optional: agar colorful bars chahiye to 'yes' rakhen warna 'no' kar dein)
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_details: percentage
