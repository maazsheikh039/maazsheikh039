name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Har roz raat ko chale
  workflow_dispatch: 
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Ye image save karne ke liye lazmi hai
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Aap ka Personal Access Token (PAT)
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Options
          user: maazsheikh039
          template: classic
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          
          # Ye line Metrics ko batati hai ke image ko repository mein commit kar do
          committer_token: ${{ secrets.METRICS_TOKEN }}
