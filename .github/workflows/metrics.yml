name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch: 
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: maazsheikh039
          template: classic
          filename: github-metrics.svg
          config_timezone: Asia/Karachi
          committer_token: ${{ secrets.METRICS_TOKEN }}
          
          # Layout aur Appearance
          config_display: compact 
          config_padding: 0, 8%
          config_output: svg
          
          # --- Ye section aapka naya graph aur purana data dono dikhayega ---
          # 'activity' aur 'community' hi wo graph generate karte hain
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          
          # Is se graph aur stats ek khaas tarteeb mein aayenge
          config_order: base.header, base.activity, base.community, base.repositories, base.metadata
          
          # Aapka colorful languages wala part
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_details: percentage
          plugin_languages_limit: 8
